<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Data Penyimpanan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <main class="container">

        <h3 class="mt-4">Tambah Data Absensi</h3>

        <form action="/users" method="post" enctype="multipart/form-data">
            <div class="card p-3 mb-4">
              <div class="mb-3">
                  <label>Nama</label>
                  <input type="text" name="nama" class="form-control" required>
              </div>

              <div class="mb-3">
                  <label>Email</label>
                  <input type="email" name="email" class="form-control" required>
              </div>
              <div class="mb-3">
                  <label>File</label>
                  <input type="file" name="file" class="form-control" accept=".png, .jpg, .jpeg" required>
                  <div class="form-text">
                    Max size 5MB
                  </div>
              </div>
              <div class="col-sm-10">     
                  <button type="submit" class="btn btn-primary">SIMPAN</button>
              </div>
            </div>

        </form>
        
        <h3 class="mt-4">List Absensi</h3>
        <div class="card p-3">
            <form method="get" class="d-flex mb-3">
                <input class="form-control me-2" name="katakunci" value="{{ request.args.get('katakunci','') }}"
                    placeholder="Cari nama/email">
                <button class="btn btn-secondary">
                    Cari
                </button>
            </form>

            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ item.nama }}</td>
                        <td>{{ item.email }}</td>
                        <td>Diterima</td>

                        <td>
                            <button class="btn btn-warning btn-sm"
                                onclick="showEdit('{{ item.id }}', '{{ item.nama }}', '{{ item.email }}')">
                                EDIT
                            </button>

                            <form action="/users/{{ item.id }}/delete" method="post" style="display:inline;">
                                <button class="btn btn-danger btn-sm" onclick="return confirm('Hapus data?')">
                                    DELETE
                                </button>
                            </form>
                        </td>
                    </tr>

                    <tr id="edit-{{ item.id }}" style="display:none">
                        <td colspan="5">
                            <form action="/users/{{ item.id }}/update" method="post" enctype="multipart/form-data">
                                <div class="row">
                                    <div class="col">
                                        <input class="form-control" name="nama" id="nama-{{ item.id }}">
                                    </div>
                                    <div class="col">
                                        <input class="form-control" name="email" id="email-{{ item.id }}">
                                    </div>
                                    <div class="col">
                                        <input type="file" name="file" class="form-control">
                                    </div>
                                    <div class="col">
                                        <button class="btn btn-primary btn-sm">
                                            Update
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </main>

    <script>
        const maxSize = 5 * 1024 * 1024;

        document.querySelector('input[name="file"]').addEventListener('change', function() {
          const file = this.files[0];
          if (file && file.size > maxSize) {
            alert("File maksimal 5 MB.");
            this.value = "";
          }
        });

        function showEdit(id, nama, email) {
            let row = document.getElementById("edit-" + id);
            row.style.display = row.style.display === "none" ? "table-row" : "none";

            document.getElementById("nama-" + id).value = nama;
            document.getElementById("email-" + id).value = email;
        }
    </script>

</body>

</html>
